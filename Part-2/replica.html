<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snowy Ice Dice</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #10131a;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      cursor: grab;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .info {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.38);
      color: white;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.35;
      z-index: 10;
      user-select: none;
      backdrop-filter: blur(3px);
    }
  </style>
</head>
<body>
  <div class="info">Drag & throw the dice 🎲<br>Snowy icy room</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import * as CANNON from "https://cdn.skypack.dev/cannon-es";

    // ---------------- SCENE ----------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfeaf5);
    scene.fog = new THREE.Fog(0xdfeaf5, 12, 26);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 6.5, 11.5);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // ---------------- LIGHTS ----------------
    scene.add(new THREE.AmbientLight(0xffffff, 0.95));

    const sun = new THREE.DirectionalLight(0xffffff, 1.15);
    sun.position.set(6, 12, 7);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 40;
    sun.shadow.camera.left = -10;
    sun.shadow.camera.right = 10;
    sun.shadow.camera.top = 10;
    sun.shadow.camera.bottom = -10;
    scene.add(sun);

    const fill = new THREE.PointLight(0xcfe7ff, 0.45, 30);
    fill.position.set(-4, 5, -3);
    scene.add(fill);

    // ---------------- ROOM SETTINGS ----------------
    const room = {
      width: 12,
      height: 8,
      depth: 12
    };

    const halfW = room.width / 2;
    const halfH = room.height / 2;
    const halfD = room.depth / 2;

    // ---------------- TEXTURES ----------------
    function createIceTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = 1024;
      const ctx = canvas.getContext("2d");

      const grad = ctx.createLinearGradient(0, 0, 1024, 1024);
      grad.addColorStop(0, "#eef8ff");
      grad.addColorStop(0.4, "#d8edf8");
      grad.addColorStop(0.7, "#c7e2f0");
      grad.addColorStop(1, "#eef9ff");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1024, 1024);

      for (let i = 0; i < 2400; i++) {
        ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random() * 0.09})`;
        ctx.beginPath();
        ctx.arc(
          Math.random() * 1024,
          Math.random() * 1024,
          Math.random() * 1.8,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

      ctx.lineCap = "round";
      for (let i = 0; i < 90; i++) {
        let x = Math.random() * 1024;
        let y = Math.random() * 1024;
        ctx.beginPath();
        ctx.moveTo(x, y);

        const segs = 4 + Math.floor(Math.random() * 6);
        for (let s = 0; s < segs; s++) {
          x += (Math.random() - 0.5) * 120;
          y += (Math.random() - 0.5) * 120;
          ctx.lineTo(x, y);
        }

        ctx.strokeStyle = `rgba(160,205,228,${0.08 + Math.random() * 0.12})`;
        ctx.lineWidth = 1 + Math.random() * 2;
        ctx.stroke();
      }

      for (let i = 0; i < 30; i++) {
        const x = Math.random() * 1024;
        const y = Math.random() * 1024;
        const r = 40 + Math.random() * 120;
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, "rgba(255,255,255,0.18)");
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(2.2, 2.2);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return tex;
    }

    function createSkyTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = 1024;
      const ctx = canvas.getContext("2d");

      const grad = ctx.createLinearGradient(0, 0, 0, 1024);
      grad.addColorStop(0, "#f4f9fd");
      grad.addColorStop(0.45, "#dcecf8");
      grad.addColorStop(0.8, "#c7deef");
      grad.addColorStop(1, "#bad5e8");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1024, 1024);

      for (let i = 0; i < 120; i++) {
        const x = Math.random() * 1024;
        const y = Math.random() * 1024;
        const r = 40 + Math.random() * 180;
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, "rgba(255,255,255,0.10)");
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(1.2, 1.2);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return tex;
    }

    const iceTexture = createIceTexture();
    const skyTexture = createSkyTexture();

    // ---------------- ROOM VISUALS ----------------
    const roomMesh = new THREE.Mesh(
      new THREE.BoxGeometry(room.width, room.height, room.depth),
      new THREE.MeshStandardMaterial({
        map: skyTexture,
        color: 0xe8f4fb,
        side: THREE.BackSide,
        roughness: 0.98,
        metalness: 0
      })
    );
    roomMesh.position.set(0, halfH, 0);
    scene.add(roomMesh);

    const floorMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(room.width, room.depth),
      new THREE.MeshStandardMaterial({
        map: iceTexture,
        color: 0xeaf7ff,
        roughness: 0.05,
        metalness: 0.02
      })
    );
    floorMesh.rotation.x = -Math.PI / 2;
    floorMesh.position.y = 0;
    floorMesh.receiveShadow = true;
    scene.add(floorMesh);

    const iceGloss = new THREE.Mesh(
      new THREE.PlaneGeometry(room.width, room.depth),
      new THREE.MeshPhysicalMaterial({
        color: 0xe2f7ff,
        transparent: true,
        opacity: 0.14,
        roughness: 0.02,
        clearcoat: 1,
        clearcoatRoughness: 0.06
      })
    );
    iceGloss.rotation.x = -Math.PI / 2;
    iceGloss.position.y = 0.003;
    scene.add(iceGloss);

    // Subtle visible boundary lines so the room edges don't disappear
    const edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(room.width, room.height, room.depth)),
      new THREE.LineBasicMaterial({
        color: 0xa9c6d9,
        transparent: true,
        opacity: 0.45
      })
    );
    edges.position.set(0, halfH, 0);
    scene.add(edges);

    const shadowFloor = new THREE.Mesh(
      new THREE.PlaneGeometry(room.width, room.depth),
      new THREE.ShadowMaterial({ opacity: 0.17 })
    );
    shadowFloor.rotation.x = -Math.PI / 2;
    shadowFloor.position.y = 0.001;
    shadowFloor.receiveShadow = true;
    scene.add(shadowFloor);

    // ---------------- DICE TEXTURES ----------------
    function createFace(n) {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = 256;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, 256, 256);

      ctx.strokeStyle = "#d7d7d0";
      ctx.lineWidth = 10;
      ctx.strokeRect(5, 5, 246, 246);

      const dots = {
        1: [[128, 128]],
        2: [[64, 64], [192, 192]],
        3: [[64, 64], [128, 128], [192, 192]],
        4: [[64, 64], [192, 64], [64, 192], [192, 192]],
        5: [[64, 64], [192, 64], [128, 128], [64, 192], [192, 192]],
        6: [[64, 64], [192, 64], [64, 128], [192, 128], [64, 192], [192, 192]]
      };

      dots[n].forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(x, y, 16, 0, Math.PI * 2);
        ctx.fillStyle = "#111";
        ctx.fill();
      });

      const tex = new THREE.CanvasTexture(canvas);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return tex;
    }

    const diceSize = 1.5;
    const diceMaterials = [
      new THREE.MeshStandardMaterial({ map: createFace(3), roughness: 0.42, metalness: 0.03 }),
      new THREE.MeshStandardMaterial({ map: createFace(4), roughness: 0.42, metalness: 0.03 }),
      new THREE.MeshStandardMaterial({ map: createFace(1), roughness: 0.42, metalness: 0.03 }),
      new THREE.MeshStandardMaterial({ map: createFace(6), roughness: 0.42, metalness: 0.03 }),
      new THREE.MeshStandardMaterial({ map: createFace(2), roughness: 0.42, metalness: 0.03 }),
      new THREE.MeshStandardMaterial({ map: createFace(5), roughness: 0.42, metalness: 0.03 })
    ];

    const diceMesh = new THREE.Mesh(
      new THREE.BoxGeometry(diceSize, diceSize, diceSize),
      diceMaterials
    );
    diceMesh.castShadow = true;
    diceMesh.receiveShadow = true;
    scene.add(diceMesh);

    // ---------------- PHYSICS ----------------
    const world = new CANNON.World({
      gravity: new CANNON.Vec3(0, -18, 0)
    });
    world.allowSleep = true;
    world.solver.iterations = 12;

    const diceMat = new CANNON.Material("dice");
    const iceMat = new CANNON.Material("ice");
    const wallMat = new CANNON.Material("wall");

    world.addContactMaterial(new CANNON.ContactMaterial(diceMat, iceMat, {
      friction: 0.0015,
      restitution: 0.05
    }));

    world.addContactMaterial(new CANNON.ContactMaterial(diceMat, wallMat, {
      friction: 0.01,
      restitution: 0.42
    }));

    const body = new CANNON.Body({
      mass: 1.8,
      material: diceMat,
      shape: new CANNON.Box(new CANNON.Vec3(diceSize / 2, diceSize / 2, diceSize / 2)),
      position: new CANNON.Vec3(0, 3, 0),
      angularDamping: 0.02,
      linearDamping: 0.006,
      sleepTimeLimit: 2.0,
      sleepSpeedLimit: 0.035
    });
    world.addBody(body);

    function addPlane(position, quaternion, material) {
      const plane = new CANNON.Body({
        mass: 0,
        material,
        shape: new CANNON.Plane()
      });
      plane.position.copy(position);
      plane.quaternion.copy(quaternion);
      world.addBody(plane);
      return plane;
    }

    // Floor
    addPlane(
      new CANNON.Vec3(0, 0, 0),
      new CANNON.Quaternion().setFromEuler(-Math.PI / 2, 0, 0),
      iceMat
    );

    // Ceiling
    addPlane(
      new CANNON.Vec3(0, room.height, 0),
      new CANNON.Quaternion().setFromEuler(Math.PI / 2, 0, 0),
      wallMat
    );

    // Left wall
    addPlane(
      new CANNON.Vec3(-halfW, 0, 0),
      new CANNON.Quaternion().setFromEuler(0, Math.PI / 2, 0),
      wallMat
    );

    // Right wall
    addPlane(
      new CANNON.Vec3(halfW, 0, 0),
      new CANNON.Quaternion().setFromEuler(0, -Math.PI / 2, 0),
      wallMat
    );

    // Back wall
    addPlane(
      new CANNON.Vec3(0, 0, -halfD),
      new CANNON.Quaternion().setFromEuler(0, 0, 0),
      wallMat
    );

    // Front wall
    addPlane(
      new CANNON.Vec3(0, 0, halfD),
      new CANNON.Quaternion().setFromEuler(0, Math.PI, 0),
      wallMat
    );

    // ---------------- SNOW ----------------
    const snowCount = 900;
    const snowGeo = new THREE.BufferGeometry();
    const snowPos = new Float32Array(snowCount * 3);
    const snowSpeed = new Float32Array(snowCount);
    const snowDrift = new Float32Array(snowCount);

    for (let i = 0; i < snowCount; i++) {
      const i3 = i * 3;
      snowPos[i3] = (Math.random() - 0.5) * room.width;
      snowPos[i3 + 1] = Math.random() * room.height;
      snowPos[i3 + 2] = (Math.random() - 0.5) * room.depth;
      snowSpeed[i] = 0.01 + Math.random() * 0.02;
      snowDrift[i] = 0.002 + Math.random() * 0.008;
    }

    snowGeo.setAttribute("position", new THREE.BufferAttribute(snowPos, 3));

    const snow = new THREE.Points(
      snowGeo,
      new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.08,
        transparent: true,
        opacity: 0.85,
        depthWrite: false
      })
    );
    scene.add(snow);

    function updateSnow(t) {
      const arr = snowGeo.attributes.position.array;
      for (let i = 0; i < snowCount; i++) {
        const i3 = i * 3;
        arr[i3 + 1] -= snowSpeed[i];
        arr[i3] += Math.sin(t * 0.7 + i * 0.37) * snowDrift[i];
        arr[i3 + 2] += Math.cos(t * 0.5 + i * 0.23) * snowDrift[i] * 0.35;

        if (arr[i3 + 1] < 0.1) {
          arr[i3] = (Math.random() - 0.5) * room.width;
          arr[i3 + 1] = room.height + Math.random();
          arr[i3 + 2] = (Math.random() - 0.5) * room.depth;
        }

        if (arr[i3] < -halfW) arr[i3] = halfW;
        if (arr[i3] > halfW) arr[i3] = -halfW;
        if (arr[i3 + 2] < -halfD) arr[i3 + 2] = halfD;
        if (arr[i3 + 2] > halfD) arr[i3 + 2] = -halfD;
      }
      snowGeo.attributes.position.needsUpdate = true;
    }

    // ---------------- DRAG / THROW ----------------
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const dragPlane = new THREE.Plane();
    const intersection = new THREE.Vector3();
    const dragOffset = new THREE.Vector3();

    let dragging = false;
    let last = new THREE.Vector3();
    let prev = new THREE.Vector3();
    let t1 = 0;
    let t2 = 0;

    function setMouse(e) {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    }

    window.addEventListener("pointerdown", (e) => {
      setMouse(e);
      raycaster.setFromCamera(mouse, camera);

      const hits = raycaster.intersectObject(diceMesh);
      if (!hits.length) return;

      dragging = true;
      renderer.domElement.classList.add("dragging");

      body.type = CANNON.Body.KINEMATIC;
      body.velocity.set(0, 0, 0);
      body.angularVelocity.set(0, 0, 0);
      body.wakeUp();

      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      dragPlane.setFromNormalAndCoplanarPoint(dir, diceMesh.position);

      if (raycaster.ray.intersectPlane(dragPlane, intersection)) {
        dragOffset.copy(diceMesh.position).sub(intersection);
        last.copy(intersection).add(dragOffset);
        prev.copy(last);
      }

      t1 = t2 = performance.now();
    });

    window.addEventListener("pointermove", (e) => {
      if (!dragging) return;

      setMouse(e);
      raycaster.setFromCamera(mouse, camera);

      if (!raycaster.ray.intersectPlane(dragPlane, intersection)) return;

      prev.copy(last);
      t1 = t2;
      last.copy(intersection).add(dragOffset);
      t2 = performance.now();

      const half = diceSize / 2;
      last.x = THREE.MathUtils.clamp(last.x, -halfW + half, halfW - half);
      last.y = THREE.MathUtils.clamp(last.y, half, room.height - half);
      last.z = THREE.MathUtils.clamp(last.z, -halfD + half, halfD - half);

      body.position.set(last.x, last.y, last.z);
    });

    function releaseDrag() {
      if (!dragging) return;

      dragging = false;
      renderer.domElement.classList.remove("dragging");

      body.type = CANNON.Body.DYNAMIC;
      body.updateMassProperties();
      body.wakeUp();

      const dt = Math.max((t2 - t1) / 1000, 0.016);
      const v = new THREE.Vector3().subVectors(last, prev).divideScalar(dt);

      body.velocity.set(v.x * 0.92, v.y * 0.92, v.z * 0.92);
      body.angularVelocity.set(
        v.z * 0.55,
        (v.x + v.z) * 0.3,
        -v.x * 0.55
      );
    }

    window.addEventListener("pointerup", releaseDrag);
    window.addEventListener("pointerleave", releaseDrag);

    // ---------------- TOP FACE ----------------
    const faceNormals = [
      { num: 3, dir: new THREE.Vector3(1, 0, 0) },
      { num: 4, dir: new THREE.Vector3(-1, 0, 0) },
      { num: 1, dir: new THREE.Vector3(0, 1, 0) },
      { num: 6, dir: new THREE.Vector3(0, -1, 0) },
      { num: 2, dir: new THREE.Vector3(0, 0, 1) },
      { num: 5, dir: new THREE.Vector3(0, 0, -1) }
    ];

    function getTopFace() {
      const up = new THREE.Vector3(0, 1, 0);
      let bestFace = 1;
      let bestDot = -Infinity;

      for (const face of faceNormals) {
        const worldDir = face.dir.clone().applyQuaternion(diceMesh.quaternion);
        const dot = worldDir.dot(up);
        if (dot > bestDot) {
          bestDot = dot;
          bestFace = face.num;
        }
      }

      return bestFace;
    }

    // ---------------- LOOP ----------------
    const clock = new THREE.Clock();
    let faceFrozen = false;

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 1 / 30);
      const elapsed = clock.elapsedTime;

      world.step(1 / 60, dt, 3);

      diceMesh.position.copy(body.position);
      diceMesh.quaternion.copy(body.quaternion);

      updateSnow(elapsed);

      if (!dragging) {
        const speed = body.velocity.length();
        const spin = body.angularVelocity.length();

        if (speed < 0.08 && spin < 0.08 && !faceFrozen) {
          faceFrozen = true;
          const topFace = getTopFace();
          document.querySelector(".info").innerHTML =
            `Drag & throw the dice 🎲<br>Top face: <b>${topFace}</b>`;
        } else if (speed >= 0.08 || spin >= 0.08) {
          faceFrozen = false;
          document.querySelector(".info").innerHTML =
            `Drag & throw the dice 🎲<br>Snowy icy room`;
        }
      }

      renderer.render(scene, camera);
    }

    animate();

    // ---------------- RESIZE ----------------
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
