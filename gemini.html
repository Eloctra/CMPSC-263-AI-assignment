<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gummy Snake Adventure!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cozy&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffeaa7; 
            font-family: 'Cozy', cursive;
            color: #d35400;
            overflow: hidden;
        }

        #ui-container {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 3rem; }
        #score { color: #27ae60; font-weight: bold; }

        canvas {
            border: 15px solid #74b9ff; 
            border-radius: 25px;
            background-color: #fab1a0; 
            box-shadow: 0 10px 0px rgba(0,0,0,0.15);
        }

        /* --- Break Overlay Styles --- */
        #break-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(116, 185, 255, 0.95); /* Semi-transparent blue */
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .break-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Cozy', cursive;
            box-shadow: 0 5px 0px #27ae60;
            margin-top: 20px;
        }

        .break-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0px #27ae60;
        }
    </style>
</head>
<body>

    <div id="break-overlay">
        <h1 style="color: white;">⏰ Time for a Break!</h1>
        <p style="color: white; font-size: 1.5rem;">You've been playing for 5 minutes.<br>Stretch your legs and rest your eyes!</p>
        <button class="break-btn" onclick="resumeGame()">I'm Ready to Play Again!</button>
    </div>

    <div id="ui-container">
        <h1>Gummy Score: <span id="score">0</span></h1>
        <p id="message" style="margin: 5px 0 0 0; font-size: 1.2rem;">Collect 20 apples for a surprise!</p>
    </div>
    <canvas id="snakeGame" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const messageElement = document.getElementById("message");
        const breakOverlay = document.getElementById("break-overlay");

        const box = 20; 
        let score = 0;
        let gameSpeed = 130; 
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = getRandomFoodPosition();
        let d = "RIGHT";
        let isDrawing = false;
        let gamePaused = false; // Flag to stop movement during break

        // --- Break Timer Logic ---
        // 5 minutes = 5 * 60 * 1000 = 300,000ms
        const breakTimeLimit = 5 * 60 * 1000; 

        setTimeout(() => {
            triggerBreak();
        }, breakTimeLimit);

        function triggerBreak() {
            gamePaused = true;
            breakOverlay.style.display = "flex";
        }

        function resumeGame() {
            gamePaused = false;
            breakOverlay.style.display = "none";
            
            // Restart the timer for another 5 minutes
            setTimeout(triggerBreak, breakTimeLimit);
        }

        // Standard Game Logic below...
        document.addEventListener("keydown", direction);
        function direction(event) {
            if (isDrawing || gamePaused) return; // Ignore input if paused
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
            isDrawing = true;
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function getRandomFoodPosition() {
            return {
                x: Math.floor(Math.random() * (canvas.width/box)) * box,
                y: Math.floor(Math.random() * (canvas.height/box)) * box
            };
        }

        function launchConfetti() {
            confetti({ particleCount: 150, spread: 70, origin: { x: 0, y: 0.6 } });
            confetti({ particleCount: 150, spread: 70, origin: { x: 1, y: 0.6 } });
        }

        function drawRoundedRect(ctx, x, y, width, height, radius, fill, stroke) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            if (fill) { ctx.fillStyle = fill; ctx.fill(); }
            if (stroke) { ctx.strokeStyle = stroke; ctx.stroke(); }
        }

        function draw() {
            if (gamePaused) return; // Stop drawing when taking a break

            isDrawing = false;
            ctx.fillStyle = "#fab1a0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawRoundedRect(ctx, food.x, food.y, box, box, 8, "#e74c3c", "white");
            
            for(let i = 0; i < snake.length; i++) {
                let color = (i == 0) ? "#2ecc71" : "#27ae60";
                drawRoundedRect(ctx, snake[i].x, snake[i].y, box, box, 6, color, "white");
            }

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                if (score === 20) launchConfetti();
                food = getRandomFoodPosition();
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                setTimeout(() => {
                    alert("Yikes! Game Over. Score: " + score);
                    location.reload(); 
                }, 100);
                return;
            }

            snake.unshift(newHead);
        }

        let game = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
